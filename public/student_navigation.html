<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岗位门户首页</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #F9FAFC;
    min-height: 100vh;
    color: #1f2937;
  }

  /* Header */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 64px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(226,232,240,0.8);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    z-index: 1000;
  }
  .header-left { display: flex; align-items: center; gap: 40px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 16px;
    box-shadow: 0 4px 12px rgba(245,158,11,0.25);
  }
  .logo-text { font-size: 18px; font-weight: 700; color: #0f172a; }
  .header-nav { display: flex; align-items: center; gap: 6px; }
  .header-nav-item {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; font-size: 14px; color: #636363;
    border-radius: 6px; text-decoration: none;
    transition: all 0.15s;
    position: relative;
    line-height: 1.5;
  }
  .header-nav-item:hover { background: #f2f2f2; color: #222; }
  .header-nav-item.active { color: #3b82f6; font-weight: 500; }
  .header-nav-item.active::after {
    content: "";
    position: absolute; bottom: 0; left: 16px; right: 16px;
    height: 2px; background: #3b82f6; border-radius: 1px;
  }
  .header-nav-item i { font-size: 16px; }
  .header-right { display: flex; align-items: center; gap: 18px; }
  .header-time { font-size: 13px; color: #94a3b8; }
  .header-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #64748b; font-size: 15px; cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .header-icon:hover { background: #f1f5f9; }
  .header-bell-badge {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; background: #ef4444;
    color: white; font-size: 10px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .header-user {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 4px; border-radius: 20px;
    background: #f8fafc; border: 1px solid #e2e8f0;
    font-size: 14px; color: #475569; cursor: pointer;
  }
  .header-user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, #fef3c7, #bfdbfe);
    display: flex; align-items: center; justify-content: center;
    color: #2563eb; font-size: 12px;
  }

  /* Main */
  .main { padding: 88px 32px 48px; max-width: 1600px; margin: 0 auto; }

  /* Hero: stats + search/banner */
  .hero-split {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 20px;
    margin-bottom: 28px;
    min-height: 420px;
  }

  .hero-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
  }

  .stat-card {
    background: linear-gradient(135deg, #5b8cff 0%, #3b6de8 100%);
    border-radius: 16px;
    padding: 20px;
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(59, 109, 232, 0.22);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(59, 109, 232, 0.32); }
  .stat-card .stat-content { position: relative; z-index: 2; }
  .stat-card .stat-label { font-size: 13px; opacity: 0.92; margin-bottom: 10px; }
  .stat-card .stat-value { font-size: 28px; font-weight: 800; }
  .stat-card .stat-decoration {
    position: absolute;
    right: -20px;
    bottom: -30px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    z-index: 1;
  }
  .stat-card .stat-decoration::before {
    content: "";
    position: absolute;
    right: -30px;
    top: -50px;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .stat-card-large {
    grid-row: 1 / 3;
  }
  .stat-card-large .stat-value { font-size: 40px; }

  /* Right area */
  .hero-right {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .search-section {
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    border: 1px solid #e7e5e4;
  }
  .search-title {
    font-size: 22px; font-weight: 800; color: #0f172a;
    margin-bottom: 14px;
  }
  .search-title span { color: #3b82f6; }
  .search-box-large {
    display: flex; align-items: center;
    background: #fafaf9; border: 1px solid #e7e5e4;
    border-radius: 12px; padding: 6px 6px 6px 16px;
  }
  .search-box-large input {
    flex: 1; border: none; outline: none;
    background: transparent; font-size: 15px; color: #334155;
  }
  .search-box-large input::placeholder { color: #a8a29e; }
  .search-box-large button {
    background: linear-gradient(135deg, #3b82f6, #60a5fa);
    color: #fff; border: none; border-radius: 10px;
    padding: 10px 24px; font-size: 15px; cursor: pointer;
    transition: all 0.2s;
  }
  .search-box-large button:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(245,158,11,0.3); }

  .hot-keywords {
    margin-top: 14px;
    display: flex; align-items: center;
    gap: 10px; flex-wrap: wrap;
  }
  .hot-keywords-label { font-size: 13px; color: #78716c; }
  .hot-keyword {
    font-size: 13px; color: #57534e;
    background: #fff7ed; border: 1px solid #ffedd5;
    padding: 4px 12px; border-radius: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .hot-keyword:hover { background: #ffedd5; color: #c2410c; }

  .hero-banner {
    flex: 1;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    min-height: 220px;
  }
  .hero-banner img {
    width: 100%; height: 100%; object-fit: cover;
    position: absolute; inset: 0;
  }
  .hero-banner-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(69,26,3,0.75) 0%, rgba(146,64,14,0.4) 100%);
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 40px; color: #fff;
  }
  .hero-banner-title { font-size: 26px; font-weight: 800; margin-bottom: 10px; }
  .hero-banner-subtitle { font-size: 14px; opacity: 0.9; }
  .hero-banner-slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.6s ease;
    cursor: pointer;
  }
  .hero-banner-slide.active { opacity: 1; z-index: 1; }
  .hero-banner-dots {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 2;
  }
  .hero-banner-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.4); cursor: pointer;
    transition: all 0.2s;
  }
  .hero-banner-dot.active { background: rgba(255,255,255,0.95); width: 20px; border-radius: 4px; }
  .hero-banner-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15); color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2; opacity: 0; transition: opacity 0.2s;
    font-size: 14px;
  }
  .hero-banner:hover .hero-banner-nav { opacity: 1; }
  .hero-banner-nav:hover { background: rgba(255,255,255,0.3); }
  .hero-banner-nav.prev { left: 12px; }
  .hero-banner-nav.next { right: 12px; }

  /* Filter */
  .filter-box {
    background: #fff; border-radius: 16px;
    padding: 20px 24px; margin-bottom: 20px;
    border: 1px solid #e7e5e4;
  }
  .filter-row { display: flex; align-items: flex-start; gap: 14px; padding: 10px 0; }
  .filter-row + .filter-row { border-top: 1px dashed #e7e5e4; }
  .filter-label { font-size: 14px; color: #64748b; font-weight: 500; min-width: 48px; padding-top: 6px; }
  .filter-tags-wrap { flex: 1; }
  .filter-tags { display: flex; gap: 10px; flex-wrap: wrap; }
  .tag {
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; color: #475569; cursor: pointer;
    background: #fafaf9; border: 1px solid #e7e5e4;
    transition: all 0.2s; white-space: nowrap;
  }
  .tag:hover { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
  .tag.active { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #fff; border-color: transparent; }
  .filter-summary {
    display: flex; align-items: center; gap: 12px;
    padding-top: 14px; margin-top: 10px;
    border-top: 1px dashed #e7e5e4;
    font-size: 13px; color: #64748b;
  }
  .filter-summary .chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: #eff6ff; color: #2563eb;
    padding: 4px 10px; border-radius: 12px;
  }
  .filter-summary .chip i { cursor: pointer; font-size: 11px; }
  .clear-btn { color: #2563eb; cursor: pointer; font-size: 13px; }
  .clear-btn:hover { text-decoration: underline; }

  /* Toolbar */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .sort-group { display: flex; gap: 8px; align-items: center; background: #fff; padding: 6px; border-radius: 12px; border: 1px solid #e7e5e4; }
  .sort-btn {
    padding: 8px 16px; border-radius: 10px;
    font-size: 13px; color: #475569; cursor: pointer;
    transition: all 0.2s;
  }
  .sort-btn:hover { color: #2563eb; }
  .sort-btn.active { background: #eff6ff; color: #2563eb; font-weight: 500; }
  .result-tip { font-size: 14px; color: #64748b; margin-bottom: 16px; }
  .result-tip b { color: #2563eb; font-weight: 700; }

  /* Cards */
  .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .job-card {
    background: #fff; border-radius: 16px; overflow: hidden;
    border: 1px solid #e7e5e4;
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: pointer;
  }
  .job-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(69,26,3,0.1);
  }
  .card-cover {
    height: 160px; position: relative;
    background-size: cover; background-position: center;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 16px; color: #fff;
  }
  .card-cover::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(69,26,3,0.85) 0%, rgba(69,26,3,0.2) 60%, transparent 100%);
  }
  .card-cover-content { position: relative; z-index: 1; }
  .cover-tags {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between; z-index: 1;
  }
  .cover-tag {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    padding: 4px 10px; border-radius: 6px;
    font-size: 11px; color: #fff;
  }
  .cover-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
  .cover-meta { font-size: 12px; opacity: 0.9; }
  .hot-badge {
    position: absolute; top: 12px; right: 12px; z-index: 2;
    background: linear-gradient(135deg, #ef4444, #f87171);
    color: #fff; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 6px;
    display: flex; align-items: center; gap: 4px;
  }
  .card-body { padding: 18px; }
  .card-title {
    font-size: 15px; font-weight: 700; color: #0f172a;
    margin-bottom: 14px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 16px;
  }
  .card-stat {
    background: #fafaf9; border-radius: 10px;
    padding: 10px; text-align: center;
  }
  .card-stat-num { font-size: 18px; font-weight: 800; color: #0f172a; }
  .card-stat-label { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .card-tag {
    font-size: 12px; padding: 4px 10px; border-radius: 6px;
    background: #f5f5f4; color: #475569;
  }
  .card-tag.orange { background: #ffedd5; color: #c2410c; }
  .card-tag.blue { background: #dbeafe; color: #1d4ed8; }
  .card-tag.green { background: #dcfce7; color: #15803d; }

  .empty-state {
    text-align: center; padding: 80px 20px; color: #94a3b8;
    grid-column: 1 / -1;
  }
  .empty-state i { font-size: 56px; margin-bottom: 18px; color: #cbd5e1; }
  .empty-state div { font-size: 15px; }

  @media (max-width: 1200px) {
    .hero-split { grid-template-columns: 1fr; }
    .hero-stats { grid-template-columns: repeat(4, 1fr); }
    .stat-card-large { grid-row: auto; }
    .stat-card-large .stat-value { font-size: 28px; }
    .card-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 768px) {
    .header { padding: 0 16px; }
    .header-nav { display: none; }
    .main { padding: 80px 16px 32px; }
    .hero-split { min-height: auto; }
    .hero-stats { grid-template-columns: repeat(2, 1fr); }
    .stat-card-large { grid-row: auto; }
    .card-grid { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; gap: 12px; align-items: flex-start; }
    .footer { padding: 0 16px; }
    .footer-inner { flex-direction: column; gap: 4px; height: auto; padding: 8px 0; }
  }

  .footer {
    border-top: 1px solid #e7e5e4;
    background: #fff;
    height: 48px;
    padding: 0 32px;
    flex-shrink: 0;
    margin-top: auto;
  }
  .footer-inner {
    max-width: 1600px;
    height: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #78716c;
  }
  .footer-links { display: flex; align-items: center; gap: 24px; }
  .footer-links span { cursor: pointer; transition: color 0.2s; }
  .footer-links span:hover { color: #2563eb; }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="header">
  <div class="header-left">
    <a href="#" class="logo">
      <div class="logo-icon"><i class="fa fa-briefcase"></i></div>
      <div class="logo-text">岗位化数智教学服务平台</div>
    </a>
    <div class="header-nav">
      <a href="http://demo2.zhiyu.com.cn:3001/portal" target="_blank" class="header-nav-item"><i class="fa fa-home"></i>门户首页</a>
      <a href="http://demo2.zhiyu.com.cn:3001/portal/workspace" target="_blank" class="header-nav-item"><i class="fa fa-th-large"></i>我的服务台</a>
      <a href="http://demo2.zhiyu.com.cn:3001/portal/apps" target="_blank" class="header-nav-item"><i class="fa fa-cog"></i>应用服务中心</a>
    </div>
  </div>
  <div class="header-right">
    <span class="header-time" id="headerTime">2026年05月09日 星期六 11:20</span>
    <div class="header-icon">
      <i class="fa fa-bell"></i>
      <span class="header-bell-badge">3</span>
    </div>
    <div class="header-user">
      <div class="header-user-avatar"><i class="fa fa-user"></i></div>
      <span>管理员</span>
    </div>
  </div>
</div>

<div class="main">

  <!-- 顶部统计/搜索/Banner -->
  <div class="hero-split">
    <!-- 左侧统计卡片 -->
    <div class="hero-stats" id="statsRow">
      <div class="stat-card stat-card-large">
        <div class="stat-content">
          <div class="stat-label">收录岗位数</div>
          <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-decoration"></div>
      </div>
      <div class="stat-card">
        <div class="stat-content">
          <div class="stat-label">覆盖专业数</div>
          <div class="stat-value" id="statPublished">0</div>
        </div>
        <div class="stat-decoration"></div>
      </div>
      <div class="stat-card">
        <div class="stat-content">
          <div class="stat-label">涉及行业数</div>
          <div class="stat-value" id="statTasks">0</div>
        </div>
        <div class="stat-decoration"></div>
      </div>
      <div class="stat-card">
        <div class="stat-content">
          <div class="stat-label">浏览人次</div>
          <div class="stat-value" id="statPositions">0</div>
        </div>
        <div class="stat-decoration"></div>
      </div>
    </div>

    <!-- 右侧搜索与 Banner -->
    <div class="hero-right">
      <div class="search-section">
        <div class="search-title">找岗位，就上<span>岗位化教学平台</span></div>
        <div class="search-box-large">
          <input type="text" id="heroSearchInput" placeholder="搜索岗位名称、岗位编码或关键词">
          <button id="heroSearchBtn"><i class="fa fa-search"></i> 搜索岗位</button>
        </div>
        <div class="hot-keywords">
          <span class="hot-keywords-label">热门搜索：</span>
          <span class="hot-keyword">前端开发</span>
          <span class="hot-keyword">数据分析师</span>
          <span class="hot-keyword">电商运营</span>
          <span class="hot-keyword">品牌经理</span>
          <span class="hot-keyword">会计师</span>
          <span class="hot-keyword">新媒体运营</span>
        </div>
      </div>

      <div class="hero-banner" id="heroBanner">
        <!-- 动态生成轮播图 -->
      </div>
    </div>
  </div>

  <!-- 筛选区 -->
  <div class="filter-box">
    <div class="filter-row">
      <span class="filter-label">行业</span>
      <div class="filter-tags-wrap">
        <div class="filter-tags" id="industryTags">
          <span class="tag active" data-value="全部">全部</span>
        </div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">专业</span>
      <div class="filter-tags-wrap">
        <div class="filter-tags" id="professionTags">
          <span class="tag active" data-value="全部">全部</span>
        </div>
      </div>
    </div>
    <div class="filter-summary" id="filterSummary" style="display:none;">
      <span>已选条件：</span>
      <span id="activeFilters"></span>
      <span class="clear-btn" id="clearFilters"><i class="fa fa-trash-o"></i> 清空筛选</span>
    </div>
  </div>

  <!-- 排序+结果提示 -->
  <div class="toolbar">
    <div class="sort-group">
      <span class="sort-btn active" data-sort="default">默认排序</span>
      <span class="sort-btn" data-sort="recent">最近收录</span>
      <span class="sort-btn" data-sort="update">最近更新</span>
    </div>
    <div class="search-box" style="display:none;">
      <input type="text" id="searchInput" placeholder="请输入岗位名称">
      <span class="count"><span id="searchCount">0</span></span>
    </div>
  </div>

  <div class="result-tip">当前共展示 <b id="resultCount">0</b> 个岗位查看入口</div>

  <!-- 岗位卡片 -->
  <div class="card-grid" id="cardGrid">
    <!-- 动态生成 -->
  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <i class="fa fa-search"></i>
    <div>暂无匹配的岗位，试试调整筛选条件</div>
  </div>
</div>

<script>
  // =================== 岗位数据 ===================
  const JOBS = [
    { id: "job-1", name: "企业级前端项目开发实战", code: "JOB-2026-0001", version: "v2.1", industryName: "互联网/IT", professionName: "信息技术", positionName: "前端开发工程师", batchName: "2026春季前端开发岗位建设", creatorName: "张老师", difficulty: 5, status: "published", publishTime: "2024-03-15 10:30:00", updatedAt: "2024-01-15", tasksCount: 4, totalHours: 44, hot: true, coverImage: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=600&h=400&fit=crop" },

    { id: "job-12", name: "客户关系管理实战", code: "JOB-2026-0012", version: "v1.0", industryName: "服务业", professionName: "市场营销", positionName: "客户经理", batchName: "2026春季销售岗位建设", creatorName: "周老师", difficulty: 3, status: "published", publishTime: "2024-03-01 10:00:00", updatedAt: "2024-02-20", tasksCount: 3, totalHours: 18, hot: false, coverImage: "https://images.unsplash.com/photo-1557804506-669a67965ba0?w=600&h=400&fit=crop" }
  ];

  const STATUS_MAP = {
    draft: { label: "草稿", className: "purple" },
    pending: { label: "审批中", className: "orange" },
    approved: { label: "已通过", className: "blue" },
    rejected: { label: "已驳回", className: "purple" },
    published: { label: "已发布", className: "green" },
  };

  const COVER_BACKUPS = [
    "linear-gradient(135deg,#1e3a8a,#3b7cff)",
    "linear-gradient(135deg,#7c2d12,#dc2626)",
    "linear-gradient(135deg,#064e3b,#0891b2)",
    "linear-gradient(135deg,#334155,#64748b)",
    "linear-gradient(135deg,#581c87,#a855f7)",
    "linear-gradient(135deg,#1e40af,#3b82f6)",
    "linear-gradient(135deg,#be123c,#f43f5e)",
    "linear-gradient(135deg,#0f766e,#14b8a6)"
  ];

  // =================== 初始化统计 ===================
  function initStats() {
    const total = JOBS.length;
    const professions = new Set(JOBS.map(s => s.professionName).filter(Boolean)).size;
    const industries = new Set(JOBS.map(s => s.industryName).filter(Boolean)).size;
    const views = 1280 + Math.floor(Math.random() * 500);

    animateNumber("statTotal", total);
    animateNumber("statPublished", professions);
    animateNumber("statTasks", industries);
    animateNumber("statPositions", views);
  }

  function animateNumber(id, target) {
    const el = document.getElementById(id);
    const duration = 800;
    const start = performance.now();
    function update(now) {
      const progress = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.floor(target * ease);
      if(progress < 1) requestAnimationFrame(update);
      else el.textContent = target;
    }
    requestAnimationFrame(update);
  }

  // =================== 初始化筛选标签 ===================
  function initFilters() {
    const industries = ["全部", ...new Set(JOBS.map(s => s.industryName).filter(Boolean))];
    const professions = ["全部", ...new Set(JOBS.map(s => s.professionName).filter(Boolean))];

    const industryContainer = document.getElementById("industryTags");
    industryContainer.innerHTML = industries.map((item, idx) =>
      `<span class="tag ${idx === 0 ? 'active' : ''}" data-value="${item}">${item}</span>`
    ).join("");

    const professionContainer = document.getElementById("professionTags");
    professionContainer.innerHTML = professions.map((item, idx) =>
      `<span class="tag ${idx === 0 ? 'active' : ''}" data-value="${item}">${item}</span>`
    ).join("");

    [industryContainer, professionContainer].forEach(container => {
      container.addEventListener("click", e => {
        if (e.target.classList.contains("tag")) {
          container.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
          e.target.classList.add("active");
          renderCards();
          updateFilterSummary();
        }
      });
    });
  }

  // =================== 排序 ===================
  let currentSort = "default";
  document.querySelectorAll(".sort-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".sort-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentSort = btn.dataset.sort;
      renderCards();
    });
  });

  // =================== 搜索 ===================
  const searchInput = document.getElementById("searchInput");
  const heroSearchInput = document.getElementById("heroSearchInput");
  const heroSearchBtn = document.getElementById("heroSearchBtn");

  heroSearchInput.addEventListener("input", () => {
    searchInput.value = heroSearchInput.value;
    renderCards();
  });
  heroSearchBtn.addEventListener("click", () => {
    searchInput.value = heroSearchInput.value;
    renderCards();
  });
  heroSearchInput.addEventListener("keydown", e => { if(e.key === 'Enter') heroSearchBtn.click(); });
  searchInput.addEventListener("input", () => {
    heroSearchInput.value = searchInput.value;
    renderCards();
  });

  // 热门关键词
  document.querySelectorAll('.hot-keyword').forEach(kw => {
    kw.addEventListener('click', () => {
      const text = kw.textContent;
      searchInput.value = text;
      heroSearchInput.value = text;
      renderCards();
      updateFilterSummary();
      document.querySelector('.filter-box')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // =================== 获取当前筛选条件 ===================
  function getFilterValues() {
    const activeIndustry = document.querySelector("#industryTags .tag.active");
    const activeProfession = document.querySelector("#professionTags .tag.active");
    return {
      industry: activeIndustry ? activeIndustry.dataset.value : "全部",
      profession: activeProfession ? activeProfession.dataset.value : "全部",
      keyword: searchInput.value.trim().toLowerCase()
    };
  }

  function updateFilterSummary() {
    const { industry, profession, keyword } = getFilterValues();
    const filters = [];
    if(industry !== '全部') filters.push({ type:'industry', label:`行业：${industry}` });
    if(profession !== '全部') filters.push({ type:'profession', label:`专业：${profession}` });
    if(keyword) filters.push({ type:'keyword', label:`关键词：${keyword}` });

    const summary = document.getElementById('filterSummary');
    const activeFilters = document.getElementById('activeFilters');
    if(filters.length === 0) {
      summary.style.display = 'none';
      return;
    }
    summary.style.display = 'flex';
    activeFilters.innerHTML = filters.map(f =>
      `<span class="chip" data-type="${f.type}">${f.label} <i class="fa fa-times"></i></span>`
    ).join('');

    activeFilters.querySelectorAll('.chip i').forEach(icon => {
      icon.addEventListener('click', e => {
        e.stopPropagation();
        const type = icon.closest('.chip').dataset.type;
        if(type === 'industry') document.querySelector('#industryTags .tag[data-value="全部"]')?.click();
        if(type === 'profession') document.querySelector('#professionTags .tag[data-value="全部"]')?.click();
        if(type === 'keyword') { searchInput.value = ''; heroSearchInput.value = ''; renderCards(); updateFilterSummary(); }
      });
    });
  }

  document.getElementById('clearFilters').addEventListener('click', () => {
    document.querySelector('#industryTags .tag[data-value="全部"]')?.click();
    document.querySelector('#professionTags .tag[data-value="全部"]')?.click();
    searchInput.value = '';
    heroSearchInput.value = '';
    renderCards();
    updateFilterSummary();
  });

  // =================== 渲染卡片 ===================
  function renderCards() {
    const { industry, profession, keyword } = getFilterValues();

    let filtered = JOBS.filter(s => {
      const matchIndustry = industry === "全部" || s.industryName === industry;
      const matchProfession = profession === "全部" || s.professionName === profession;
      const matchKeyword = !keyword ||
        s.name.toLowerCase().includes(keyword) ||
        s.code.toLowerCase().includes(keyword) ||
        s.positionName.toLowerCase().includes(keyword);
      return matchIndustry && matchProfession && matchKeyword;
    });

    if (currentSort === "recent") {
      filtered.sort((a, b) => {
        const aTime = a.publishTime ? new Date(a.publishTime) : new Date(a.updatedAt);
        const bTime = b.publishTime ? new Date(b.publishTime) : new Date(b.updatedAt);
        return bTime - aTime;
      });
    } else if (currentSort === "update") {
      filtered.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    } else if (currentSort === "name") {
      filtered.sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
    }

    document.getElementById("resultCount").textContent = filtered.length;

    const grid = document.getElementById("cardGrid");
    const empty = document.getElementById("emptyState");

    if (filtered.length === 0) {
      grid.innerHTML = "";
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    grid.innerHTML = filtered.map((s, idx) => {
      const status = STATUS_MAP[s.status] || STATUS_MAP.draft;
      const dateStr = s.publishTime ? s.publishTime.split(" ")[0] : s.updatedAt;
      const displayDate = dateStr || "2024-01-01";
      const coverStyle = s.coverImage ? `background-image:url('${s.coverImage}')` : `background:${COVER_BACKUPS[idx % COVER_BACKUPS.length]}`;
      const viewCount = 120 + Math.floor(Math.random() * 880);
      const relatedScenes = Math.floor(Math.random() * 5) + 1;
      const hotBadge = s.hot ? `<div class="hot-badge"><i class="fa fa-fire"></i> 热门</div>` : '';

      return `
        <div class="job-card" data-id="${s.id}">
          <div class="card-cover" style="${coverStyle}">
            ${hotBadge}
            <div class="cover-tags">
              <span class="cover-tag">${s.version}</span>
              <span class="cover-tag">${status.label}</span>
            </div>
            <div class="card-cover-content">
              <div class="cover-title">${s.positionName || s.name}</div>
              <div class="cover-meta">岗位编码：${s.code} · ${displayDate}</div>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title">${s.name}</div>
            <div class="card-stats">
              <div class="card-stat">
                <div class="card-stat-num">${viewCount}</div>
                <div class="card-stat-label">浏览次数</div>
              </div>
              <div class="card-stat">
                <div class="card-stat-num">${relatedScenes}</div>
                <div class="card-stat-label">关联场景</div>
              </div>
              <div class="card-stat">
                <div class="card-stat-num">${s.totalHours || '-'}</div>
                <div class="card-stat-label">课程任务</div>
              </div>
            </div>
            <div class="card-tags">
              <span class="card-tag orange">${s.industryName || "未指定"}</span>
              <span class="card-tag blue">${s.professionName || "未分类"}</span>
              <span class="card-tag green">${s.creatorName}</span>
            </div>
          </div>
        </div>
      `;
    }).join("");

    grid.querySelectorAll(".job-card").forEach(card => {
      card.addEventListener("click", () => {
        window.location.href = "student.html";
      });
    });
  }

  // =================== 轮播图展示 ===================
  let bannerCarouselInterval = null;
  let bannerCurrentIndex = 0;

  function loadBannersFromStorage() {
    try {
      return JSON.parse(localStorage.getItem('zhiyu_banners') || '[]');
    } catch (e) {
      return [];
    }
  }

  function renderBannerCarousel() {
    const container = document.getElementById('heroBanner');
    const banners = loadBannersFromStorage().filter(b => b.status !== 'hidden');

    if (banners.length === 0) {
      container.innerHTML = `
        <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=1200&h=400&fit=crop" alt="岗位Banner">
        <div class="hero-banner-overlay">
          <div class="hero-banner-title">岗位能力，精准对接</div>
          <div class="hero-banner-subtitle">海量岗位能力模型，覆盖互联网、金融、电商、服务等热门行业</div>
        </div>
      `;
      return;
    }

    container.innerHTML = `
      ${banners.map((banner, idx) => `
        <div class="hero-banner-slide ${idx === 0 ? 'active' : ''}" data-index="${idx}" data-jump="${banner.jumpPosition || ''}">
          <img src="${banner.imageData}" alt="${banner.title || 'Banner'}">
          <div class="hero-banner-overlay">
            <div class="hero-banner-title">${banner.title || '岗位能力，精准对接'}</div>
            <div class="hero-banner-subtitle">${banner.description || (banner.boundPosition ? '关联岗位：' + banner.boundPosition : '海量岗位能力模型，覆盖互联网、金融、电商、服务等热门行业')}</div>
          </div>
        </div>
      `).join('')}
      <div class="hero-banner-nav prev" id="bannerPrev"><i class="fa fa-chevron-left"></i></div>
      <div class="hero-banner-nav next" id="bannerNext"><i class="fa fa-chevron-right"></i></div>
      <div class="hero-banner-dots">
        ${banners.map((_, idx) => `<div class="hero-banner-dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>`).join('')}
      </div>
    `;

    bannerCurrentIndex = 0;
    startBannerCarousel();

    container.querySelectorAll('.hero-banner-slide').forEach(slide => {
      slide.addEventListener('click', () => {
        const jump = slide.dataset.jump;
        if (jump) {
          window.location.href = 'student.html?positionName=' + encodeURIComponent(jump);
        }
      });
    });

    document.getElementById('bannerPrev').addEventListener('click', (e) => {
      e.stopPropagation();
      const count = banners.length;
      setBannerSlide((bannerCurrentIndex - 1 + count) % count);
    });

    document.getElementById('bannerNext').addEventListener('click', (e) => {
      e.stopPropagation();
      const count = banners.length;
      setBannerSlide((bannerCurrentIndex + 1) % count);
    });

    container.querySelectorAll('.hero-banner-dot').forEach(dot => {
      dot.addEventListener('click', (e) => {
        e.stopPropagation();
        setBannerSlide(parseInt(dot.dataset.index));
      });
    });
  }

  function setBannerSlide(index) {
    const container = document.getElementById('heroBanner');
    const slides = container.querySelectorAll('.hero-banner-slide');
    const dots = container.querySelectorAll('.hero-banner-dot');
    if (!slides.length) return;

    slides.forEach((s, i) => s.classList.toggle('active', i === index));
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
    bannerCurrentIndex = index;
  }

  function startBannerCarousel() {
    if (bannerCarouselInterval) clearInterval(bannerCarouselInterval);
    bannerCarouselInterval = setInterval(() => {
      const banners = loadBannersFromStorage().filter(b => b.status !== 'hidden');
      if (banners.length <= 1) return;
      setBannerSlide((bannerCurrentIndex + 1) % banners.length);
    }, 5000);
  }

  // =================== 初始化 ===================
  initStats();
  initFilters();
  renderCards();
  renderBannerCarousel();
  updateFilterSummary();

  // 更新日期时间
  function updateDateTime() {
    const now = new Date();
    const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const weekDay = weekDays[now.getDay()];
    const hour = String(now.getHours()).padStart(2, '0');
    const minute = String(now.getMinutes()).padStart(2, '0');
    const timeEl = document.getElementById('headerTime');
    if (timeEl) timeEl.textContent = `${year}年${month}月${day}日 ${weekDay} ${hour}:${minute}`;
  }
  updateDateTime();
  setInterval(updateDateTime, 60000);
</script>
